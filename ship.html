    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    <link href="style.css" rel="stylesheet">
</head>

                <a class="navbar-brand" href="#page-top"> 
                        <div class="navbar-brand" href="index.html"></div>
                        <div class="brand-title">MONOPOLY</div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Nav bar
                    <i class="fas fa-bars ms-1"></i>

                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="tokensDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false" onclick="event.stopPropagation()">
                                Tokens

        </nav>
        <!-- Masthead-->
        <header class="masthead">
            <div class="container">
                <div class="masthead-heading">Monopoly</div>
                <div class="masthead-subheading">Own it all</div>
            </div>
        </header>


        <section class="page-section" id="index">
            <div class="container text-center">
                <div class="index" style="position: relative; display: inline-block;">
                <img class="img-fluid" src="assets/img/logos/Mbanner.webp">
                </div>
            </div>
            <div class="container text-center my-4">
                <h2 style="color: #000;">Ship!</h2>
                <h4 style="color: #000;">Let's sail</h4>
            </div>
        </section>


        <canvas class="three-canvas"></canvas>

        <div class="container text-center mt-3">
            <button class="btn btn-dark mx-2" onclick="toggleWireframe()">Toggle wireframe</button>
            <button class="btn btn-dark mx-2" onclick="toggleRotate()">Rotate</button>
            <button class="btn btn-dark mx-2" onclick="walk()">Swim</button>
            <button class="btn btn-dark mx-2" onclick="stomp()">Skim</button>
            <button class="btn btn-dark mx-2" onclick="toggleLight()">Light</button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>


        <script>
        //scene
        const scene = new THREE.Scene();

        //camera
        const canvas = document.querySelector('.three-canvas');
        const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        camera.position.z = 8;

        //renderer
        const renderer = new THREE.WebGLRenderer({ canvas: canvas });
        renderer.setSize(600, 500);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        //lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        //audio
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        audioLoader.load('sounds/skim.wav', function(buffer) {
            sound.setBuffer(buffer);
            sound.setLoop(true);
        });

        //load ship model
        let ship;
        const loader = new THREE.GLTFLoader();
        loader.load('models/ship.glb', function(gltf) {
            ship = gltf.scene;
            ship.scale.set(1.5,1.5,1.5);
            ship.position.set(0,-2.5,0);
            ship.rotation.y = Math.PI/2;
            scene.add(ship);
        });

        //button functions
        let wireframe = false;
        function toggleWireframe() {
            wireframe = !wireframe;
            ship.traverse(function(child) {
                if (child.isMesh) {
                    child.material.wireframe = wireframe;
                }
            });
        }

        let rotating = false;
        function toggleRotate() {
            rotating = !rotating;
        }

        let walking = false;
        let stomping = false;

        function walk() {
            walking = !walking;
            stomping = false;
        }

        function stomp() {
            stomping = !stomping;
            walking = false;
            if (stomping) {
                sound.play();
            } else {
                sound.stop();
            }
        }

        //animate
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            time += 0.05;
            if (rotating && ship) ship.rotation.y += 0.01;
            if (walking && ship) ship.position.y = -2.5 + Math.sin(time) * 0.3;
            if (stomping && ship) ship.position.y = -2.5 + Math.sin(time * 4) * 0.5;
            renderer.render(scene, camera);
        }
        animate();

        //light toggle
        let lightOn = true;
        function toggleLight() {
            lightOn = !lightOn;
            if (lightOn) {
                //normal lighting
                light.intensity = 1;
                ambientLight.intensity = 0.5;
            } else {
                //dim lighting
                light.intensity = 0.2;
                ambientLight.intensity = 0.1;
            }
        }
        </script> 
    </body>
</html>
